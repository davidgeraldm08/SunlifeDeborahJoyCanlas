<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Sun Life</title>
    <style>
        /* Global Styles */
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f0f7ff; /* Soft blue background */
            color: #003366; /* Dark blue text */
        }

        h1 {
            text-align: center;
            margin-top: 60px;
            font-size: 2.5em;
            color: #ffd700; /* Sun Life yellow */
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .container1 {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            max-width: 1200px;
            margin: 50px auto;
            flex-wrap: wrap; /* For mobile responsiveness */
            gap: 20px;
        }

        .leftside {
            flex: 1;
            min-width: 300px;
            font-size: 1.1em;
            line-height: 1.6;
        }

        .rightside {
            flex: 1;
            min-width: 300px;
            text-align: center;
        }

        .rightside img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Button styling */
        .get-started-btn {
            display: block;
            margin: 40px auto;
            padding: 15px 40px;
            font-size: 1.2em;
            color: #003366;
            background-color: #ffd700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .get-started-btn:hover {
            background-color: #e6c200;
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .container1 {
                flex-direction: column;
                text-align: center;
            }

            .leftside {
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <h1>WELCOME TO YOUR SUN LIFE JOURNEY!</h1>

    <div class="container1">
        <div class="leftside">
            <p>Hi, I'm <strong>Deborah Joy B. Canlas</strong>, a dedicated financial advisor  
            committed to helping individuals and families achieve financial stability and long-term growth.  
            I believe that everyone deserves access to clear, practical, and personalized financial guidance.</p>
        </div>

        <div class="rightside">
            <img src="intropic.JPG" alt="Deborah Joy B. Canlas">
        </div>
    </div>

    <button class="get-started-btn" onclick="enterSite()">Get Started!</button>

    <script>
        function enterSite() {
            window.location.href = "html.html";
        }
    </script>
</body>
</html>
